permissions:
  contents: read
  packages: write
  
name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: python -m pytest

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Docker image
      run: docker build -t ghcr.io/${{ github.actor }}/devops-app:latest .

    - name: Push Docker image
      run: docker push ghcr.io/${{ github.actor }}/devops-app:latest
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ghcr.io/${{ github.actor }}/devops-app:latest
          docker stop devops-app || true
          docker rm devops-app || true
          docker run -d -p 80:5000 --name devops-app ghcr.io/${{ github.actor }}/devops-app:latest      